<!DOCTYPE html>
<html>
    <head>
        <title>First A-frame Project G-Help</title>
    </head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <body>
        <a-scene>
            <!-- Sky and ground -->
            <a-sky color="#84b8ff"></a-sky>
            <a-plane position="0 0 0" rotation="-90 0 0" width="60" height="60" color="#1ea33b"></a-plane>

            <!-- Pathway -->
            <a-box position="0 0.03 -6" width="2" height="0.06" depth="1" color="#d9d9d9"></a-box>
            <a-box position="0 0.03 -5" width="2" height="0.06" depth="1" color="#d9d9d9"></a-box>
            <a-box position="0 0.03 -4" width="2" height="0.06" depth="1" color="#d9d9d9"></a-box>
            <a-box position="0 0.03 -3" width="2" height="0.06" depth="1" color="#d9d9d9"></a-box>
            <a-box position="0 0.03 -2" width="2" height="0.06" depth="1" color="#d9d9d9"></a-box>
            <a-box position="0 0.03 -1" width="2" height="0.06" depth="1" color="#d9d9d9"></a-box>
            <a-box position="0 0.03  0" width="2" height="0.06" depth="1" color="#d9d9d9"></a-box>

            <!-- Gazebo base -->
            <a-cylinder position="0 0.15 -10" radius="4"   height="0.3" color="#d7d2c8"></a-cylinder>
            <a-cylinder position="0 0.3  -10" radius="3.3" height="0.1" color="#efe9df"></a-cylinder>

            <!-- Gazebo columns -->
            <a-cylinder position=" 2.3 1.5  -8.2" radius="0.12" height="3" color="#111111"></a-cylinder>
            <a-cylinder position="-2.3 1.5  -8.2" radius="0.12" height="3" color="#111111"></a-cylinder>
            <a-cylinder position=" 3.0 1.5 -10"   radius="0.12" height="3" color="#111111"></a-cylinder>
            <a-cylinder position="-3.0 1.5 -10"   radius="0.12" height="3" color="#111111"></a-cylinder>
            <a-cylinder position=" 2.3 1.5 -11.8" radius="0.12" height="3" color="#111111"></a-cylinder>
            <a-cylinder position="-2.3 1.5 -11.8" radius="0.12" height="3" color="#111111"></a-cylinder>

            <!-- Gazebo railing (hollow rings with entry gap aligned to pathway) -->
            <a-entity position="0 1.0 -10" rotation="90 0 0" geometry="primitive: torus; radius: 2.8; radiusTubular: 0.05; arc: 310" material="color: #5ccf7b"></a-entity>
            <a-entity position="0 0.6 -10" rotation="90 0 0" geometry="primitive: torus; radius: 2.8; radiusTubular: 0.05; arc: 310" material="color: #5ccf7b"></a-entity>

            <!-- Outer wall around gazebo with entry gap aligned to pathway - taller -->
            <!-- Wall centre z=-10, radius=5.4 → back edge at z=-15.4 -->
            <a-cylinder position="0 3.1 -10" radius="5.4" height="6" theta-start="25" theta-length="310" open-ended="true" material="color: #6b3a2a; side: double; roughness: 0.6"></a-cylinder>

            <!-- Gazebo roof -->
            <a-cylinder position="0 3.1 -10" radius="2.9" height="0.15" color="#C0C0C0"></a-cylinder>
            <a-cone     position="0 4.1 -10" radius-bottom="3.2" radius-top="0.1" height="2" color="#C0C0C0"></a-cone>

            <!-- Dining table under gazebo -->
            <a-cylinder position="0 0.95 -10" radius="1.1"  height="0.1"  color="#8b5e3c"></a-cylinder>
            <a-cylinder position="0 0.5  -10" radius="0.12" height="0.9"  color="#6d4a31"></a-cylinder>
            <a-cylinder position="0 0.1  -10" radius="0.35" height="0.05" color="#6d4a31"></a-cylinder>

            <!-- Chairs -->
            <a-box position=" 0   0.35  -8.6" depth="0.6" width="0.6" height="0.1" rotation="0 180 0" color="#7a4a2a"></a-box>
            <a-box position=" 0   0.85  -8.9" depth="0.1" width="0.6" height="1"   rotation="0 180 0" color="#7a4a2a"></a-box>
            <a-box position=" 0   0.35 -11.4" depth="0.6" width="0.6" height="0.1" rotation="0 0 0"   color="#7a4a2a"></a-box>
            <a-box position=" 0   0.85 -11.1" depth="0.1" width="0.6" height="1"   rotation="0 0 0"   color="#7a4a2a"></a-box>
            <a-box position=" 1.5 0.35 -10"   depth="0.6" width="0.6" height="0.1" rotation="0 -90 0" color="#7a4a2a"></a-box>
            <a-box position=" 1.8 0.85 -10"   depth="0.1" width="0.6" height="1"   rotation="0 -90 0" color="#7a4a2a"></a-box>
            <a-box position="-1.5 0.35 -10"   depth="0.6" width="0.6" height="0.1" rotation="0  90 0" color="#7a4a2a"></a-box>
            <a-box position="-1.8 0.85 -10"   depth="0.1" width="0.6" height="1"   rotation="0  90 0" color="#7a4a2a"></a-box>

            <!-- Milo can -->
            <a-cylinder position="-0.35 1.08 -10"  radius="0.18" height="0.32" color="#1f7a32"></a-cylinder>
            <a-cylinder position="-0.35 1.25 -10"  radius="0.19" height="0.02" color="#0f4f1f"></a-cylinder>

            <!-- Milk can -->
            <a-cylinder position="0.25 1.06 -9.7"  radius="0.16" height="0.28" color="#e5e5e5"></a-cylinder>
            <a-cylinder position="0.25 1.21 -9.7"  radius="0.17" height="0.02" color="#cfcfcf"></a-cylinder>

            <!-- Mugs with hot chocolate -->
            <a-cylinder position=" 0.45 1.03 -10.2"  radius="0.1"  height="0.14" color="#ffffff"></a-cylinder>
            <a-torus     position=" 0.54 1.04 -10.2"  radius="0.045" radius-tubular="0.01" rotation="0 0 90" color="#ffffff"></a-torus>
            <a-cylinder position=" 0.45 1.09 -10.2"  radius="0.09" height="0.02" color="#6b3f2a"></a-cylinder>

            <a-cylinder position="-0.6  1.03 -10.15" radius="0.1"  height="0.14" color="#ffffff"></a-cylinder>
            <a-torus     position="-0.69 1.04 -10.15" radius="0.045" radius-tubular="0.01" rotation="0 0 90" color="#ffffff"></a-torus>
            <a-cylinder position="-0.6  1.09 -10.15" radius="0.09" height="0.02" color="#6b3f2a"></a-cylinder>

            <!-- Steps -->
            <a-box position="0 0.05 -8.1" width="2.4" height="0.1" depth="0.6" color="#d7d2c8"></a-box>
            <a-box position="0 0.10 -8.7" width="2.0" height="0.1" depth="0.6" color="#efe9df"></a-box>

            <!-- Flower bed left pathway -->
            <a-cylinder position="-1.5 0.2 -3" radius="0.8" height="0.4" color="#228B22" material="roughness: 0.8"></a-cylinder>
            <a-sphere   position="-1.5 0.6 -3"   radius="0.30" color="#FF69B4"></a-sphere>
            <a-sphere   position="-1.2 0.5 -3.2" radius="0.20" color="#FF1493"></a-sphere>
            <a-sphere   position="-1.8 0.5 -2.8" radius="0.25" color="#DA70D6"></a-sphere>

            <!-- Flower bed right pathway -->
            <a-cylinder position="1.5 0.2 -3"   radius="0.8" height="0.4" color="#228B22" material="roughness: 0.8"></a-cylinder>
            <a-sphere   position=" 1.5 0.6 -3"   radius="0.30" color="#FF69B4"></a-sphere>
            <a-sphere   position=" 1.2 0.5 -3.2" radius="0.20" color="#FF1493"></a-sphere>
            <a-sphere   position=" 1.8 0.5 -2.8" radius="0.25" color="#DA70D6"></a-sphere>

            <!-- Bench left pathway -->
            <a-box position="-2.5 0.40 -4"  width="1.2" height="0.3" depth="0.4" color="#8B4513"></a-box>
            <a-box position="-2.5 0.85 -4"  width="1.2" height="0.2" depth="0.3" color="#654321"></a-box>
            <a-box position="-3.0 0.40 -4.2" width="0.3" height="0.8" depth="0.4" color="#8B4513"></a-box>

            <!-- Bench right pathway -->
            <a-box position="2.5 0.40 -4"   width="1.2" height="0.3" depth="0.4" color="#8B4513"></a-box>
            <a-box position="2.5 0.85 -4"   width="1.2" height="0.2" depth="0.3" color="#654321"></a-box>
            <a-box position="3.0 0.40 -4.2" width="0.3" height="0.8" depth="0.4" color="#8B4513"></a-box>

            <!-- Small fountain center gazebo -->
            <a-cylinder position="0 0.05 -10" radius="0.4"  height="0.1"  color="#4169E1"></a-cylinder>
            <a-cylinder position="0 0.55 -10" radius="0.35" height="0.05" color="#1E90FF"></a-cylinder>
            <a-cylinder position="0 0.25 -10" radius="0.1"  height="1.2"  color="#4682B4"></a-cylinder>

            <!-- ============================================================
                 TREES — all placed OUTSIDE the wall
                 Wall: centre z=-10, radius=5.4  → back edge z=-15.4
                                                 → side edges x=±5.4
                 All trees are at z≤-17 or x≥±8 so none clip the wall.
            ============================================================ -->

            <!-- Tree 1 — right side outside wall (x=8, z=-10) -->
            <a-cylinder position=" 8   2   -10"   radius="0.25" height="4"   src="Textures/Tree Bark.jpg" repeat="1 4"   material="roughness: 0.7; metalness: 0.1; side: double"></a-cylinder>
            <a-sphere   position=" 8   4.5 -10"   radius="1.3" color="#4a7c59" material="roughness: 0.8; side: double"></a-sphere>
            <a-sphere   position=" 8   5.5 -10"   radius="1.1" color="#356d40" material="roughness: 0.9; side: double"></a-sphere>
            <a-sphere   position=" 8   6.2 -10"   radius="0.8" color="#2d5a33" material="roughness: 0.9; side: double"></a-sphere>

            <!-- Tree 2 — left side outside wall (x=-8, z=-10) -->
            <a-cylinder position="-8   2   -10"   radius="0.25" height="4"   src="Textures/Tree Bark.jpg" repeat="1 4"   material="roughness: 0.7; metalness: 0.1; side: double"></a-cylinder>
            <a-sphere   position="-8   4.5 -10"   radius="1.3" color="#4a7c59" material="roughness: 0.8; side: double"></a-sphere>
            <a-sphere   position="-8   5.5 -10"   radius="1.1" color="#356d40" material="roughness: 0.9; side: double"></a-sphere>
            <a-sphere   position="-8   6.2 -10"   radius="0.8" color="#2d5a33" material="roughness: 0.9; side: double"></a-sphere>

            <!-- Tree 3 — right, behind wall (x=7, z=-17) -->
            <a-cylinder position=" 7   2   -17"   radius="0.22" height="3.8" src="Textures/Tree Bark.jpg" repeat="1 3.8" material="roughness: 0.7; metalness: 0.1; side: double"></a-cylinder>
            <a-sphere   position=" 7   4.2 -17"   radius="1.2" color="#4a7c59" material="roughness: 0.8; side: double"></a-sphere>
            <a-sphere   position=" 7   5.1 -17"   radius="1.0" color="#356d40" material="roughness: 0.9; side: double"></a-sphere>
            <a-sphere   position=" 7   5.8 -17"   radius="0.7" color="#2d5a33" material="roughness: 0.9; side: double"></a-sphere>

            <!-- Tree 4 — left, behind wall (x=-7, z=-17) -->
            <a-cylinder position="-7   2   -17"   radius="0.22" height="3.8" src="Textures/Tree Bark.jpg" repeat="1 3.8" material="roughness: 0.7; metalness: 0.1; side: double"></a-cylinder>
            <a-sphere   position="-7   4.2 -17"   radius="1.2" color="#4a7c59" material="roughness: 0.8; side: double"></a-sphere>
            <a-sphere   position="-7   5.1 -17"   radius="1.0" color="#356d40" material="roughness: 0.9; side: double"></a-sphere>
            <a-sphere   position="-7   5.8 -17"   radius="0.7" color="#2d5a33" material="roughness: 0.9; side: double"></a-sphere>

            <!-- Tree 5 — centre-right, directly behind wall (x=4, z=-18) -->
            <a-cylinder position=" 4   2   -18"   radius="0.28" height="4.2" src="Textures/Tree Bark.jpg" repeat="1 4.2" material="roughness: 0.7; metalness: 0.1; side: double"></a-cylinder>
            <a-sphere   position=" 4   4.7 -18"   radius="1.4" color="#4a7c59" material="roughness: 0.8; side: double"></a-sphere>
            <a-sphere   position=" 4   5.8 -18"   radius="1.2" color="#356d40" material="roughness: 0.9; side: double"></a-sphere>
            <a-sphere   position=" 4   6.5 -18"   radius="0.9" color="#2d5a33" material="roughness: 0.9; side: double"></a-sphere>

            <!-- Tree 6 — centre-left, directly behind wall (x=-4, z=-18) -->
            <a-cylinder position="-4   2   -18"   radius="0.28" height="4.2" src="Textures/Tree Bark.jpg" repeat="1 4.2" material="roughness: 0.7; metalness: 0.1; side: double"></a-cylinder>
            <a-sphere   position="-4   4.7 -18"   radius="1.4" color="#4a7c59" material="roughness: 0.8; side: double"></a-sphere>
            <a-sphere   position="-4   5.8 -18"   radius="1.2" color="#356d40" material="roughness: 0.9; side: double"></a-sphere>
            <a-sphere   position="-4   6.5 -18"   radius="0.9" color="#2d5a33" material="roughness: 0.9; side: double"></a-sphere>

            <!-- Lighting -->
            <a-entity light="type: ambient; intensity: 0.7"></a-entity>
            <a-entity light="type: directional; intensity: 0.7" position="-2 6 2"></a-entity>
        </a-scene>
    </body>
</html>
